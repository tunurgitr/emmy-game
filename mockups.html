<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emmy's Fidget Trading — Design Mockups</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 24px;
      background: linear-gradient(135deg, #ffd1f0 0%, #c8e7ff 50%, #d4ffe4 100%);
      text-align: center;
    }
    h1 { font-size: clamp(24px, 6vw, 44px); color: #4a2b6b; text-shadow: 0 2px 0 #fff; }
    p.sub { color: #6b5a86; font-size: 16px; max-width: 560px; }
    .cards { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }
    a.card {
      display: block; width: 240px; padding: 26px 20px; border-radius: 24px;
      background: #fff; box-shadow: 0 12px 30px rgba(90,60,140,.25);
      text-decoration: none; color: #333; transition: transform .15s, box-shadow .15s;
      border: 4px solid transparent;
    }
    a.card:hover { transform: translateY(-6px) scale(1.02); border-color: #ffb020; }
    .card .big { font-size: 52px; }
    .card h2 { margin: 10px 0 6px; font-size: 22px; }
    .card .tag { font-size: 13px; color: #888; }
    a.back { color: #6b5a86; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <h1>🎨 Early Design Mockups</h1>
  <p class="sub">These were the two directions we explored. The finished game blends Look B's layout with Look A's colors.</p>
  <div class="cards">
    <a class="card" href="/mockup-a.html">
      <div class="big">🃏</div>
      <h2>Look A: Card Duel</h2>
      <div class="tag">Two facing cards, bright pastels, splashy verdict</div>
    </a>
    <a class="card" href="/mockup-b.html">
      <div class="big">🪵</div>
      <h2>Look B: Trade Table</h2>
      <div class="tag">Vertical table, needle meter, collection shelf</div>
    </a>
  </div>
  <a class="back" href="/">← back to game</a>
</body>
</html>
